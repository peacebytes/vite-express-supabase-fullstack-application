name: Deploy to Cloud Run

on:
  push:
    branches: [main]

env:
  REGION: us-central1

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    outputs:
      backend_url: ${{ steps.deploy.outputs.url }}
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - id: deploy
        run: |
          gcloud run deploy ai-tools-backend \
            --source ./backend \
            --region ${{ env.REGION }} \
            --port 3001 \
            --allow-unauthenticated \
            --set-env-vars "SUPABASE_URL=${{ secrets.SUPABASE_URL }},SUPABASE_KEY=${{ secrets.SUPABASE_KEY }}" \
            --format="value(status.url)" \
            --quiet
          URL=$(gcloud run services describe ai-tools-backend --region ${{ env.REGION }} --format="value(status.url)")
          echo "url=$URL" >> "$GITHUB_OUTPUT"

  deploy-frontend:
    runs-on: ubuntu-latest
    needs: deploy-backend
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - run: |
          gcloud run deploy ai-tools-frontend \
            --source ./frontend \
            --region ${{ env.REGION }} \
            --allow-unauthenticated \
            --set-env-vars "VITE_API_URL=${{ needs.deploy-backend.outputs.backend_url }}" \
            --quiet
